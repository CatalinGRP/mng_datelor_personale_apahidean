<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Lab 8-9t</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .sectiune { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        button { padding: 10px; margin: 5px; cursor: pointer; font-weight: bold; }
        h2 { margin-top: 0; color: #333; }
    </style>

    <script>
        // TASK 3 LABORATOR
        
        document.cookie = "favorite_task=collect Data"; 

        function alertCookie() { 
            alert(document.cookie); 
        }

        // EXERCIȚIILE MOZILLA (MDN)
        
        // 1. Creare simplă
        function mdnCreeaza() {
            document.cookie = "test_mdn=Salut";
            alert("Am creat cookie-ul -> test_mdn=Salut");
        }

        // 2. Creare cu expirare (Max-Age)
        function mdnCreeazaExpirare() {
            document.cookie = "tema=dark; max-age=3600";
            alert("Am creat cookie-ul 'tema=dark' care expiră într-o oră.");
        }

        // 3. Verificare dacă există (folosind .some din MDN)
        function mdnVerifica() {
            let exista = document.cookie.split('; ').some(item => item.startsWith('test_mdn='));
            if (exista) {
                alert("DA! Cookie-ul 'test_mdn' există.");
            } else {
                alert("NU! Cookie-ul 'test_mdn' nu a fost găsit.");
            }
        }

        // 4. Citire valoare exactă 
        function mdnCiteste() {
            let valoare = document.cookie.split('; ').find(row => row.startsWith('test_mdn='))?.split('=')[1];
            if (valoare) {
                alert("Valoarea găsită este: " + valoare);
            } else {
                alert("Nu pot citi valoarea, cookie-ul nu există.");
            }
        }

        // 5. Ștergere 
        function mdnSterge() {
            document.cookie = "test_mdn=; expires=Thu, 01 Jan 1970 00:00:00 GMT";
            alert("Am șters cookie-ul 'test_mdn'!");
        }
    </script>
</head>
<body>

    <h1>Laborator Managementul Datelor</h1>

    <div class="sectiune">
        <h2>Task 3</h2>
        <button onclick="alertCookie()" style="background-color: #add8e6;">Show cookies</button>
    </div>

    <div class="sectiune">
        <h2>Exerciții Mozilla (MDN)</h2>
        <p></p>
        <button onclick="mdnCreeaza()">Creează Cookie</button>
        <button onclick="mdnCreeazaExpirare()">Creează cu Max-Age</button>
        <button onclick="mdnVerifica()">Verifică existența</button>
        <button onclick="mdnCiteste()">Citește valoarea</button>
        <button onclick="mdnSterge()" style="background-color: #ffcccb;">Șterge Cookie-ul</button>
    </div>

</body>
</html>
