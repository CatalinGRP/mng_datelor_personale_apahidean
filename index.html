<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Lab 8-9: Testare Cookies (Metoda MDN)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 600px; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; border-radius: 5px; border: none; background-color: #0056b3; color: white; font-weight: bold; }
        button:hover { background-color: #004494; }
        .btn-delete { background-color: #dc3545; }
        .btn-delete:hover { background-color: #c82333; }
        #consola { margin-top: 20px; padding: 15px; background-color: #333; color: #00ff00; font-family: monospace; border-radius: 5px; min-height: 20px; }
    </style>
    
    <script>
        // Funcție de ajutor pentru a scrie mesaje în "consola" de pe pagină
        function afiseazaMesaj(mesaj) {
            document.getElementById('consola').innerText = mesaj;
        }

        // --- EXERCIȚII BAZATE PE GHIDUL MDN ---

        // 1. CREARE COOKIE
        function creeazaCookie() {
            // Setăm un cookie valabil 1 oră (3600 secunde)
            document.cookie = "student_logat=Da; max-age=3600; path=/";
            afiseazaMesaj("✅ SUCCES: Cookie-ul 'student_logat' a fost creat!");
        }

        // 2. VERIFICARE DACĂ EXISTĂ (Metoda din MDN folosind .some)
        function verificaExistenta() {
            // MDN ne învață să spargem șirul document.cookie și să verificăm dacă începe cu numele căutat
            let exista = document.cookie.split('; ').some(item => item.startsWith('student_logat='));
            
            if (exista) {
                afiseazaMesaj("🔍 VERIFICARE: DA! Cookie-ul se află în browser.");
            } else {
                afiseazaMesaj("❌ VERIFICARE: NU! Cookie-ul nu există. Poate l-ai șters?");
            }
        }

        // 3. CITIREA VALORII EXACTE (Metoda din MDN folosind .find)
        function citesteValoarea() {
            // Căutăm exact cookie-ul nostru și îi extragem valoarea de după semnul "="
            let valoare = document.cookie
              .split('; ')
              .find(row => row.startsWith('student_logat='))
              ?.split('=')[1];
            
            if (valoare) {
                afiseazaMesaj("📖 CITIRE: Valoarea cookie-ului este: " + valoare);
            } else {
                afiseazaMesaj("⚠️ EROARE: Nu pot citi valoarea pentru că acest cookie nu există!");
            }
        }

        // 4. ȘTERGEREA COOKIE-ULUI (Metoda din MDN cu data de expirare în trecut)
        function stergeCookie() {
            // Ștergerea se face suprascriind cookie-ul cu o dată de expirare din anul 1970
            document.cookie = "student_logat=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";
            afiseazaMesaj("🗑️ ȘTERGERE: Cookie-ul a fost distrus!");
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Simulator Cookies (Conform MDN)</h2>
        <p>Apasă butoanele în ordine pentru a testa ciclul de viață al unui cookie (Creare &rarr; Verificare &rarr; Citire &rarr; Ștergere &rarr; Verificare din nou).</p>

        <button onclick="creeazaCookie()">1. Creează Cookie</button>
        <button onclick="verificaExistenta()">2. Verifică existența</button>
        <button onclick="citesteValoarea()">3. Citește valoarea</button>
        <button class="btn-delete" onclick="stergeCookie()">4. Șterge Cookie-ul</button>

        <div id="consola">Aștept comenzi...</div>
    </div>
</body>
</html>
